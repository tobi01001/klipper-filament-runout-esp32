name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      # Pre-download the ESP32 toolchain and all project libraries so the agent
      # never needs to fetch them (200+ MB) during its session.  This makes
      # build/test steps deterministic and fast.
      - name: Cache PlatformIO toolchain and libraries
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-esp32-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-esp32-

      - name: Pre-build firmware (warms toolchain + library cache)
        run: |
          cd $GITHUB_WORKSPACE
          pio run -e esp32dev
