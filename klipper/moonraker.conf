# ─── ESP32 Filament Runout Sensor – Moonraker Integration ────────────────────
#
# Add the blocks below to your moonraker.conf (typically
# ~/printer_data/config/moonraker.conf).
#
# Replace <ESP32_IP> with the actual IP address (or mDNS hostname) of the
# ESP32 filament sensor on your local network, e.g. 192.168.1.42
#
# Prerequisites:
#   - curl installed on the Klipper host  (apt install curl)
#   - gcode_shell_command.py Klipper extra installed (see printer.cfg)
#
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. HTTP Sensor – COMPATIBILITY WARNING ────────────────────────────────────
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  IMPORTANT: "type: http" is NOT supported by most current Moonraker     │
# │  releases.  If you see any of these warnings in your Moonraker log,     │
# │  the [sensor] block below will NOT work on your installation:           │
# │                                                                         │
# │    "Failed to configure sensor [sensor esp32_filament_runout]           │
# │     Unsupported sensor type: http"                                      │
# │    "Unparsed config option 'url: ...' detected in section               │
# │     [sensor esp32_filament_runout]"                                     │
# │    "Unparsed config option 'timeout: ...' detected ..."                 │
# │    "Unparsed config option 'poll_rate: ...' detected ..."               │
# │                                                                         │
# │  ► If you see those warnings: REMOVE or COMMENT OUT the entire          │
# │    [sensor esp32_filament_runout] section below to stop the warnings.   │
# │    Fault detection and pause-on-runout still work fully via the GPIO    │
# │    wire (Option A in the user instructions) and via the fault_gcode     │
# │    configured on the ESP32 itself (see printer.cfg).                    │
# │                                                                         │
# │  ► For live DHT22 temperature/humidity monitoring without the Moonraker │
# │    [sensor] block, open the ESP32 web UI (http://<ESP32_IP>) directly.  │
# │    The data is also available via REST:                                  │
# │      GET http://<ESP32_IP>/api/status  (full status including DHT)      │
# │      GET http://<ESP32_IP>/api/dht     (DHT-only: temp, humidity, valid)│
# └─────────────────────────────────────────────────────────────────────────┘
#
# If your Moonraker build DOES support "type: http" (no warnings appear),
# uncomment the block below to enable the Sensors panel in Mainsail and
# history logging of encoder velocity, fault state, and ambient conditions.
#
# [sensor esp32_filament_runout]
# type: http
# # ↓ Change this to your ESP32's IP address or mDNS hostname
# url: http://<ESP32_IP>/api/status
# timeout: 3.0
# poll_rate: 5.0
#
# # Whether the sensor is currently enabled (bool, 0 or 1 in Mainsail history)
# parameter_sensor_enabled:
#     units: bool
#
# # True when a filament-runout fault is active
# parameter_fault:
#     units: bool
#     history_field: filament_fault
#
# # Encoder-measured filament velocity (mm/s)
# parameter_enc_vel:
#     units: mm/s
#     history_field: encoder_velocity
#
# # Extruder velocity as reported by Moonraker/Klipper (mm/s)
# parameter_ext_vel:
#     units: mm/s
#     history_field: extruder_velocity
#
# # Time since the last filament motion was detected (ms)
# # Large values during printing indicate a potential jam before fault triggers
# parameter_motion_ago_ms:
#     units: ms
#
# # Current nozzle temperature (°C)
# parameter_nozzle_temp:
#     units: °C
#     history_field: nozzle_temperature
#
# # Ambient temperature from the DHT22 sensor (°C)
# # Only populated when the DHT22 sensor is wired, enabled, and returning valid data.
# parameter_dht_temp:
#     units: °C
#     history_field: ambient_temperature
#
# # Relative humidity from the DHT22 sensor (%RH)
# parameter_dht_humidity:
#     units: %RH
#     history_field: ambient_humidity


# ── 2. Shell Commands (non-blocking subprocesses via asyncio) ─────────────────
#
# These run curl in a subprocess managed by Moonraker's asyncio executor.
# They return immediately to Moonraker; the subprocess runs in the background.
# Klipper macros call them with RUN_SHELL_COMMAND CMD=<name>.
#
# persist: false  → change is applied only in ESP32 RAM; survives until reboot
# persist: true   → change is written to NVS and survives ESP32 reboots
#
# ↓ Change <ESP32_IP> in each command to your ESP32's IP address.

[shell_command filament_sensor_enable]
command: curl -s -X POST -H "Content-Type: application/json" -d '{"enabled":true,"persist":false}' http://<ESP32_IP>/api/sensor
timeout: 5.0
verbose: False

[shell_command filament_sensor_disable]
command: curl -s -X POST -H "Content-Type: application/json" -d '{"enabled":false,"persist":false}' http://<ESP32_IP>/api/sensor
timeout: 5.0
verbose: False

[shell_command filament_sensor_reset]
command: curl -s -X POST http://<ESP32_IP>/api/reset
timeout: 5.0
verbose: False


# ── 3. DHT22 Monitoring Without type: http ────────────────────────────────────
#
# When the [sensor] block is not available, use these shell commands to query
# the ESP32 REST API directly.  With verbose: True, their output is printed
# to the Mainsail / Fluidd G-code console when called from a macro (e.g. via
# READ_AMBIENT_SENSOR defined in printer.cfg).
#
# ↓ Change <ESP32_IP> to your ESP32's IP address in each command.

# Read DHT22 temperature and humidity.
# Output example: "Ambient: 23.4°C  45.2%RH"
[shell_command read_dht_sensor]
command: bash -c "curl -sf --max-time 3 http://<ESP32_IP>/api/dht | python3 -c \"import json,sys; d=json.load(sys.stdin); print('Ambient: ' + str(round(d['temp'],1)) + '\u00b0C  ' + str(round(d['humidity'],1)) + '%RH') if d.get('valid') else print('DHT22: no valid reading (check wiring and pin config)')\""
timeout: 8.0
verbose: True

# Read the full ESP32 sensor status: state, fault flag, encoder velocity, nozzle temperature.
# Output example: "Sensor: state=PRINTING  fault=False  enc=3.5mm/s  nozzle=215.0C"
[shell_command read_sensor_status]
command: bash -c "curl -sf --max-time 3 http://<ESP32_IP>/api/status | python3 -c \"import json,sys; s=json.load(sys.stdin); print('Sensor: state=' + s.get('state','?') + '  fault=' + str(s.get('fault',False)) + '  enc=' + str(round(s.get('enc_vel',0),2)) + 'mm/s  nozzle=' + str(round(s.get('nozzle_temp',0),1)) + '\u00b0C')\""
timeout: 8.0
verbose: True
