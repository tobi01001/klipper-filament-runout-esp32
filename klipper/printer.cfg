# ─── ESP32 Filament Runout Sensor – Klipper Macro Integration ────────────────
#
# Add the blocks below to your printer.cfg (or include them from a separate
# file with [include esp32_filament_sensor.cfg]).
#
# Prerequisites:
#   - gcode_shell_command.py Klipper extra must be installed.
#     Install via KIAUH:  Advanced → Install gcode shell command
#     Or manually:
#       wget -O ~/klipper/klippy/extras/gcode_shell_command.py \
#         https://raw.githubusercontent.com/dw-0/kiauh/master/resources/gcode_shell_command.py
#       sudo systemctl restart klipper
#
#   - The three [shell_command] blocks in moonraker.conf must be present.
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Enable the filament runout sensor ────────────────────────────────────────
#
# Use in PRINT_START to arm the sensor at the beginning of a print.
# The change is RAM-only (persist:false); set persist:true in moonraker.conf
# if you want the state to survive an ESP32 reboot.
#
[gcode_macro FILAMENT_SENSOR_ENABLE]
description: Enable the ESP32 filament runout sensor
gcode:
    RUN_SHELL_COMMAND CMD=filament_sensor_enable
    M118 ESP32 filament sensor: ENABLED


# ── Disable the filament runout sensor ───────────────────────────────────────
#
# Use in PRINT_END, during filament changes, or when loading/unloading
# filament to avoid false fault triggers.
#
[gcode_macro FILAMENT_SENSOR_DISABLE]
description: Disable the ESP32 filament runout sensor
gcode:
    RUN_SHELL_COMMAND CMD=filament_sensor_disable
    M118 ESP32 filament sensor: DISABLED


# ── Reset an active fault ─────────────────────────────────────────────────────
#
# Clears the FAULT state on the ESP32 and restores normal monitoring.
# Must be called before resuming a paused print after a runout event.
#
[gcode_macro FILAMENT_SENSOR_RESET]
description: Reset an active filament fault on the ESP32 sensor
gcode:
    RUN_SHELL_COMMAND CMD=filament_sensor_reset
    M118 ESP32 filament sensor: fault RESET


# ── Example PRINT_START integration ──────────────────────────────────────────
#
# Uncomment and adapt if you want the sensor to be automatically armed
# and disarmed around every print.
#
# [gcode_macro PRINT_START]
# gcode:
#     # … your existing PRINT_START gcode …
#     FILAMENT_SENSOR_RESET    # clear any leftover fault from previous print
#     FILAMENT_SENSOR_ENABLE   # arm sensor


# ── Example PRINT_END integration ────────────────────────────────────────────
#
# [gcode_macro PRINT_END]
# gcode:
#     # … your existing PRINT_END gcode …
#     FILAMENT_SENSOR_DISABLE  # disarm sensor while idle


# ── ESP32 fault_gcode: direct WebSocket-triggered pause ──────────────────────
#
# The ESP32 firmware sends a configurable G-code command directly to Klipper
# via its Moonraker WebSocket connection the instant a fault is detected.
# This is independent of GPIO wiring and works as long as the ESP32 is on the
# same network as Moonraker.
#
# Default fault command (set in firmware/src/config.h):
#   DEFAULT_FAULT_GCODE "PAUSE"
#
# You can change the fault G-code at runtime in the ESP32 web UI under
# Configuration → "Fault G-code command" without reflashing.  Examples:
#   PAUSE                              ← default, pauses the print
#   FILAMENT_RUNOUT_HANDLER            ← call a custom macro (see below)
#   M600                               ← filament change command
#
# To configure persistently:
#   POST http://<ESP32_IP>/api/config
#   { "fault_gcode": "FILAMENT_RUNOUT_HANDLER" }
#
# ── Example custom runout handler macro ───────────────────────────────────────
#
# [gcode_macro FILAMENT_RUNOUT_HANDLER]
# description: Custom action triggered by ESP32 fault_gcode on filament runout
# gcode:
#     M118 Filament runout detected – pausing print
#     PAUSE
#     # Optional: beep or LED notification
#     # M300 S440 P500

# ── Example PAUSE integration (called by Moonraker on runout) ─────────────────
#
# If you use the GPIO-pin runout method (filament_switch_sensor in printer.cfg),
# this macro is already called automatically.  If you poll the ESP32 fault field
# from a Moonraker automation instead, trigger PAUSE from there.
#
# [gcode_macro FILAMENT_RUNOUT_HANDLER]
# gcode:
#     M118 Filament runout detected – pausing print
#     PAUSE
