; ─── PlatformIO Project Configuration ────────────────────────────────────────
; ESP32 Intelligent Filament Runout Sensor
; Framework : Arduino (ESP-IDF + FreeRTOS underneath)
; Board     : Generic ESP32 Dev Board (38-pin)
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor speed (must match SERIAL_BAUD in config.h)
monitor_speed = 115200

; Upload port – adjust to your system (e.g., /dev/ttyUSB0 on Linux)
; upload_port = /dev/ttyUSB0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3          ; INFO level ESP-IDF logs
    -DCONFIG_ARDUHAL_LOG_COLORS=1 ; coloured serial output
    ; OLED display support is enabled by default.
    ; Comment out the line below (or remove ENABLE_OLED from config.h) to
    ; compile without the display driver (saves ~50 kB of flash and 1 kB RAM).
    ; -UENABLE_OLED                ; uncomment to force-disable at build time

; External libraries
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0   ; JSON parsing for Moonraker API responses
    olikraus/U8g2 @ ^2.35.7          ; SSD1306 OLED display driver (128×64, I²C)

; Partition scheme with enough app space (default is fine for this firmware)
; board_build.partitions = default.csv
