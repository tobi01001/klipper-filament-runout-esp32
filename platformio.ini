; ─── PlatformIO Project Configuration ────────────────────────────────────────
; ESP32 Intelligent Filament Runout Sensor
; Framework : Arduino (ESP-IDF + FreeRTOS underneath)
; Board     : Generic ESP32 Dev Board (38-pin)
; Encoder   : KY-040 rotary encoder module (CLK/DT/SW + VCC + GND)
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
; Source lives in firmware/src so docs and firmware stay separate in the repo.
src_dir = firmware/src

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor speed (must match SERIAL_BAUD in config.h)
monitor_speed = 115200

; Upload port – adjust to your system
; Linux   : /dev/ttyUSB0  or  /dev/ttyACM0
; macOS   : /dev/cu.SLAB_USBtoUART  or  /dev/cu.usbserial-*
; Windows : COM3  (check Device Manager)
; upload_port = /dev/ttyUSB0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3          ; INFO level ESP-IDF logs
    -DCONFIG_ARDUHAL_LOG_COLORS=1 ; coloured serial output

; External libraries (resolved automatically by PlatformIO)
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0   ; JSON parsing for Moonraker API responses

; Partition scheme (default 4 MB layout – sufficient for this firmware)
board_build.partitions = default.csv
