; ─── PlatformIO Project Configuration ────────────────────────────────────────
; ESP32 Intelligent Filament Runout Sensor
; Framework : Arduino (ESP-IDF + FreeRTOS underneath)
; Board     : Generic ESP32 Dev Board (38-pin)
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
; Source lives in firmware/src so docs and firmware stay separate in the repo.
src_dir = firmware/src

; ─── Shared base configuration ───────────────────────────────────────────────
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; LittleFS filesystem image (built from the data/ directory)
board_build.filesystem = littlefs

; Partition table: firmware exceeds the default OTA slot (1,280 KB).
; min_spiffs.csv provides 1,920 KB app slots with a reduced SPIFFS/LittleFS
; partition.  See FLASH_OPTIMIZATION.md for details.
board_build.partitions = min_spiffs.csv

; Serial monitor speed (must match SERIAL_BAUD in config.h)
monitor_speed = 115200

; Upload port – adjust to your system (e.g., /dev/ttyUSB0 on Linux)
; upload_port = /dev/ttyUSB0

; ─── Firmware-size optimisations ──────────────────────────────────────────────
; Remove the default -O2 speed optimisation added by the Arduino/IDF build
; system so that our -Os below takes effect cleanly.
build_unflags =
    -O2
    -O3

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3          ; INFO level ESP-IDF logs
    -DCONFIG_ARDUHAL_LOG_COLORS=1 ; coloured serial output
    -DWEBSOCKETS_NETWORK_TYPE=NETWORK_ESP32 ; links2004: plain WiFiClient, no TLS/wss
    ; ── Size optimisations ──────────────────────────────────────────────────
    -Os                           ; optimise for size instead of speed
    -DDISABLE_BT                  ; BT never used; guards btStop()/esp_bt_controller_disable()
                                  ; in main.cpp so the linker can GC the BT library objects
    ; ── Optional: Link-Time Optimisation (LTO) ──────────────────────────────
    ; LTO passes the whole program to the linker for cross-TU dead-code
    ; elimination.  It requires gcc-ar/gcc-ranlib as the archiver – the
    ; enable_lto.py extra_script wires those up automatically.
    ; To activate: uncomment BOTH lines below.
    ; -flto
    ; ── OLED display ────────────────────────────────────────────────────────
    ; OLED display support is enabled by default (via #ifndef DISABLE_OLED guard
    ; in config.h).  To build without the display driver (saves ~50 kB flash and
    ; 1 kB RAM), uncomment the line below.
    ; -DDISABLE_OLED               ; uncomment to force-disable OLED at build time

; Uncomment the line below together with -flto above to enable LTO.
; The script replaces the plain archiver with xtensa-esp32-elf-gcc-ar so
; that LTO IR is preserved in intermediate archives.
; extra_scripts = pre:firmware/tools/enable_lto.py

; External libraries
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0   ; JSON parsing for Moonraker API responses
    olikraus/U8g2 @ ^2.35.7          ; SSD1306 OLED display driver (128×64, I²C)
    links2004/WebSockets @ ^2.4.0        ; Moonraker WS transport, plain TCP (NETWORK_ESP32)

; ─── OTA Upload Environment (VS Code / PlatformIO push) ──────────────────────
; Usage:
;   pio run -e esp32dev_ota -t upload --upload-port <DEVICE_IP_OR_HOSTNAME>
;
; Or set upload_port here (or in an untracked local.ini) and simply run:
;   pio run -e esp32dev_ota -t upload
;
; The OTA password must match OTA_PASSWORD in config.h (default: "ota1234").
[env:esp32dev_ota]
extends          = env:esp32dev
upload_protocol  = espota
upload_port    = filament-sensor.local   ; set your device IP / mDNS hostname
upload_flags     =
    --auth=ota1234
